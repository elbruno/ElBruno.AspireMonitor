name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          
      - name: Restore dependencies
        run: dotnet restore src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj
dotnet restore src/ElBruno.AspireMonitor.Tests/ElBruno.AspireMonitor.Tests.csproj
        
      - name: Build
        run: dotnet build src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj --configuration Release --no-restore
dotnet build src/ElBruno.AspireMonitor.Tests/ElBruno.AspireMonitor.Tests.csproj --configuration Release --no-restore
        
      - name: Run tests
        run: dotnet test src/ElBruno.AspireMonitor.Tests/ElBruno.AspireMonitor.Tests.csproj --configuration Release --no-build --verbosity normal
        
      - name: Publish Windows executable
        run: dotnet publish src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj --configuration Release --output ./publish --no-build
        
      - name: Create release package
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          if ([string]::IsNullOrEmpty($version)) {
            $version = "${{ github.event.inputs.version }}"
          }
          Compress-Archive -Path ./publish/* -DestinationPath "ElBruno.AspireMonitor-v$version.zip"
        
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./ElBruno.AspireMonitor-v${{ github.event.release.tag_name }}.zip
          asset_name: ElBruno.AspireMonitor-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip



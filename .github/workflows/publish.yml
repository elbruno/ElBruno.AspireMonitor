name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (leave empty to use csproj version)"
        required: false
        type: string

jobs:
  publish:
    runs-on: windows-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "release") {
            $v = "${{ github.event.release.tag_name }}" -replace '^v', ''
          } elseif ("${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $csproj = Get-Content src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj -Raw
            if ($csproj -match '<Version>([^<]+)</Version>') { 
              $v = $Matches[1] 
            } else { 
              throw "No version found in csproj" 
            }
          }
          if ($v -notmatch '^\d+\.\d+\.\d+') { 
            throw "Invalid version: $v" 
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "📦 Publishing version: $v"

      - name: Restore
        run: |
          dotnet restore src/ElBruno.AspireMonitor.Tests/ElBruno.AspireMonitor.Tests.csproj
          dotnet restore src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj

      - name: Build
        run: |
          dotnet build src/ElBruno.AspireMonitor.Tests/ElBruno.AspireMonitor.Tests.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet build src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Unit Tests
        run: dotnet test src/ElBruno.AspireMonitor.Tests/ElBruno.AspireMonitor.Tests.csproj -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/ElBruno.AspireMonitor/ElBruno.AspireMonitor.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem artifacts/*.nupkg | ForEach-Object {
            Write-Host "Pushing $($_.Name)"
            dotnet nuget push $_.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) { throw "Push failed for $($_.Name)" }
          }

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
